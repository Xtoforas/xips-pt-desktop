name: build-desktop

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform set to build
        required: true
        default: all
        type: choice
        options:
          - all
          - windows
          - macos
          - linux
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: build-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  select-platforms:
    name: Select platforms
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Build matrix
        id: set-matrix
        env:
          REQUESTED_PLATFORM: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.platform || 'all' }}
        run: |
          case "$REQUESTED_PLATFORM" in
            windows)
              MATRIX='{"include":[{"platform":"windows","label":"Windows","os":"windows-latest","bundles":"nsis,msi","artifact_paths":"apps/desktop/src-tauri/target/release/bundle/nsis/**\napps/desktop/src-tauri/target/release/bundle/msi/**"}]}'
              ;;
            macos)
              MATRIX='{"include":[{"platform":"macos","label":"macOS","os":"macos-latest","bundles":"app,dmg","artifact_paths":"apps/desktop/src-tauri/target/release/bundle/macos/**\napps/desktop/src-tauri/target/release/bundle/dmg/**"}]}'
              ;;
            linux)
              MATRIX='{"include":[{"platform":"linux","label":"Linux","os":"ubuntu-24.04","bundles":"appimage,deb,rpm","artifact_paths":"apps/desktop/src-tauri/target/release/bundle/appimage/**\napps/desktop/src-tauri/target/release/bundle/deb/**\napps/desktop/src-tauri/target/release/bundle/rpm/**"}]}'
              ;;
            *)
              MATRIX='{"include":[{"platform":"windows","label":"Windows","os":"windows-latest","bundles":"nsis,msi","artifact_paths":"apps/desktop/src-tauri/target/release/bundle/nsis/**\napps/desktop/src-tauri/target/release/bundle/msi/**"},{"platform":"macos","label":"macOS","os":"macos-latest","bundles":"app,dmg","artifact_paths":"apps/desktop/src-tauri/target/release/bundle/macos/**\napps/desktop/src-tauri/target/release/bundle/dmg/**"},{"platform":"linux","label":"Linux","os":"ubuntu-24.04","bundles":"appimage,deb,rpm","artifact_paths":"apps/desktop/src-tauri/target/release/bundle/appimage/**\napps/desktop/src-tauri/target/release/bundle/deb/**\napps/desktop/src-tauri/target/release/bundle/rpm/**"}]}'
              ;;
          esac
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  package:
    needs: select-platforms
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.select-platforms.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Install Tauri Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Build desktop bundles
        working-directory: apps/desktop
        run: npx tauri build --bundles ${{ matrix.bundles }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xips-pt-desktop-${{ matrix.platform }}-${{ github.ref_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
